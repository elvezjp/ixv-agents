name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  pre-commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install pre-commit
        run: pip install pre-commit
      - name: Install pre-commit hooks
        run: pre-commit install
      - name: Run pre-commit on all files
        run: pre-commit run --all-files

  setup-test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Run setup_workspace.sh
        run: bash scripts/setup_workspace.sh --no-backup
      - name: Verify generated files
        run: |
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            case "$f" in \#*) continue ;; esac
            if [ ! -e "$f" ]; then
              echo "Missing: $f" >&2
              exit 1
            fi
          done < tests/fixtures/expected-files.txt
      - name: Verify symlinks
        run: |
          test -L workspace/roles
          test -L workspace/.claude/skills
          test -L workspace/.opencode/skills

  setup-test-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run setup_workspace.ps1
        shell: pwsh
        run: .\scripts\setup_workspace.ps1 -NoBackup
      - name: Verify generated files
        shell: pwsh
        run: |
          Get-Content tests/fixtures/expected-files.txt | ForEach-Object {
            $f = $_.Trim()
            if ($f -eq "" -or $f.StartsWith("#")) { return }
            $path = $f -replace "/", "\"
            if (-not (Test-Path $path)) {
              Write-Error "Missing: $path"
              exit 1
            }
          }
      - name: Verify junctions
        shell: pwsh
        run: |
          $junctions = @(
            "workspace\roles",
            "workspace\.claude\skills",
            "workspace\.opencode\skills"
          )
          foreach ($j in $junctions) {
            $item = Get-Item $j -ErrorAction Stop
            if ($item.LinkType -ne "Junction") {
              Write-Error "Not a junction: $j"
              exit 1
            }
          }

  boot-dryrun:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            shell: bash
            setup: bash scripts/setup_workspace.sh --no-backup
            boot: bash scripts/boot.sh
          - os: macos-latest
            shell: bash
            setup: bash scripts/setup_workspace.sh --no-backup
            boot: bash scripts/boot.sh
          - os: windows-latest
            shell: pwsh
            setup: .\scripts\setup_workspace.ps1 -NoBackup
            boot: .\scripts\boot.ps1
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install tmux (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: sudo apt-get update && sudo apt-get install -y tmux

      - name: Install psmux (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: irm https://raw.githubusercontent.com/marlocarlo/psmux/master/scripts/install.ps1 | iex

      - name: Setup workspace
        shell: ${{ matrix.shell }}
        run: ${{ matrix.setup }}

      - name: Run boot (dry run)
        shell: ${{ matrix.shell }}
        env:
          IXV_DRY_RUN: "1"
        run: ${{ matrix.boot }}
        timeout-minutes: 2

      - name: Snapshot pane structure
        shell: bash
        run: |
          tmux list-panes -t ixv-agents -F '#{pane_index}|#{pane_title}' | sort > panes-actual.txt
          cat panes-actual.txt
          diff tests/fixtures/expected-panes.txt panes-actual.txt

      - name: Cleanup tmux session
        if: always()
        shell: bash
        run: tmux kill-session -t ixv-agents 2>/dev/null || true
